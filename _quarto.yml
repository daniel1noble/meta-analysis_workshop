project:
  type: book
  output-dir: _book

book:
  title: "Meta-Analysis Workshop"
  author: "Daniel W.A. Noble"
  date: today
  sidebar:
    logo: figs/logo.png
  chapters:
    - index.qmd
    - part: "Fundamentals of Meta-Analysis"
      chapters:
        - introduction-to-meta.qmd
    - part: "Effect Sizes"
      chapters:
        - effect-size.qmd
        - effect-assume.qmd
        - nuis-het.qmd
    - part: "Statistical Models"
      chapters:
        - fixed-vs-random.qmd
    - part: "Heterogeneity"
      chapters:
        - het.qmd
    - part: "Meta-Regression"
      chapters:
        - metaregression.qmd
    - part: "Advanced Topics"
      chapters:
        - multi-level.qmd
        - complex-nonind.qmd
        - phylo.qmd
        - pub-bias1.qmd
        - pub-bias2.qmd
  repo-url: https://github.com/noble-lab/meta-analysis_workshop
  sharing: [twitter, facebook, linkedin]
  
bibliography: bib/refs.bib
csl: bib/the-journal-of-experimental-biology.csl

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-fold: show
    code-tools: true
    code-copy: true
    
knitr:
  opts_chunk:
    echo: true
    cache: false
    message: false
    warning: false
